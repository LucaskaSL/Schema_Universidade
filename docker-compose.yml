services:
  meu-motor-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: senhasecreta
      POSTGRES_DB: meus_estudos
    ports:
      - "5432:5432"
    volumes:
      - dados_do_postgres:/var/lib/postgresql/data
  
  minha-tela-pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@teste.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - meu-motor-postgres
    volumes:
      - dados_do_pgadmin:/var/lib/pgadmin

volumes:
  dados_do_postgres:
  dados_do_pgadmin: 